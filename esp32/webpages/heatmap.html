<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADC Heatmap</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    color: #eee;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 24px;
  }
  h1 { font-size: 1.4rem; font-weight: 500; }
  #status {
    font-size: 0.85rem;
    opacity: 0.7;
  }
  #grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
  }
  .cell {
    width: 120px;
    height: 120px;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-size: 1.6rem;
    font-weight: 600;
    transition: background-color 0.1s;
  }
  .cell .label {
    font-size: 0.7rem;
    font-weight: 400;
    opacity: 0.7;
    margin-bottom: 4px;
  }
</style>
</head>
<body>
  <h1>3x3 ADC Heatmap</h1>
  <div id="status">Connecting...</div>
  <div id="grid"></div>

<script>
const ADC_MAX = 4095;
const POLL_MS = 50;
const grid = document.getElementById('grid');
const status = document.getElementById('status');

const cells = [];
for (let i = 0; i < 9; i++) {
  const cell = document.createElement('div');
  cell.className = 'cell';
  cell.innerHTML = `<span class="label">GPIO ${i + 1}</span><span class="val">--</span>`;
  grid.appendChild(cell);
  cells.push(cell);
}

function valToColor(v) {
  const t = v / ADC_MAX;
  const r = Math.round(30 + t * 225);
  const g = Math.round(30 + (1 - Math.abs(t - 0.5) * 2) * 120);
  const b = Math.round(200 - t * 170);
  return `rgb(${r},${g},${b})`;
}

let frameCount = 0;

async function poll() {
  try {
    const res = await fetch('/api/adc');
    const msg = await res.json();
    if (msg.type === 'adc' && Array.isArray(msg.values)) {
      for (let i = 0; i < 9; i++) {
        cells[i].style.backgroundColor = valToColor(msg.values[i]);
        cells[i].querySelector('.val').textContent = msg.values[i];
      }
      frameCount++;
      status.textContent = 'Frames: ' + frameCount;
    } else if (msg.type === 'hello') {
      status.textContent = 'Device: ' + msg.msg;
    } else if (msg.type === 'waiting') {
      status.textContent = 'Waiting for serial data...';
    }
  } catch {
    status.textContent = 'Server offline';
  }
}

setInterval(poll, POLL_MS);
</script>
</body>
</html>
